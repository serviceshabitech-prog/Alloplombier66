<!doctype html>
<html lang="fr">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>AlloPlombier66 - Dépannage 24/7</title>

<style>
body{
  font-family:Arial, sans-serif;
  margin:0;
  background:#f4f7fb;
}

.wrap{
  max-width:720px;
  margin:24px auto;
  padding:16px;
}

.card{
  background:#fff;
  border-radius:14px;
  padding:25px;
  box-shadow:0 6px 22px rgba(0,0,0,.08);
  text-align:center;
}

/* LOGO CENTRÉ ET PLUS GRAND */
.logo{
  text-align:center;
  margin-bottom:20px;
}

.logo img{
  max-width:280px;
  width:100%;
  height:auto;
}

.badge{
  background:#0b3d91;
  color:#fff;
  padding:8px 14px;
  border-radius:999px;
  font-size:14px;
  font-weight:800;
  display:inline-block;
  margin-bottom:20px;
}

input, textarea, select{
  width:100%;
  padding:12px;
  margin:10px 0;
  border:1px solid #d7dde6;
  border-radius:10px;
  font-size:16px;
}

textarea{
  min-height:100px;
}

button{
  width:100%;
  padding:15px;
  background:#ff7a00;
  color:#fff;
  font-size:18px;
  font-weight:800;
  border:none;
  border-radius:12px;
  cursor:pointer;
}

button:hover{
  background:#e56700;
}

.call{
  display:inline-block;
  margin-top:20px;
  font-weight:bold;
  color:#0b3d91;
  text-decoration:none;
  font-size:18px;
}
</style>
</head>

<body>
<div class="wrap">
<div class="card">

<div class="logo">
  <img src="alloplombier66.png" alt="AlloPlombier66">
</div>

<div class="badge">24H/7J - Urgence - 66</div>

<form id="smsForm">
<input type="text" name="nom" placeholder="Nom / Prénom" required>
<input type="tel" name="tel" placeholder="Votre téléphone" required>
<input type="text" name="ville" placeholder="Ville" required>

<select name="urgence" required>
<option value="">Type de problème</option>
<option>Fuite d'eau</option>
<option>Canalisation bouchée</option>
<option>WC bouché</option>
<option>Chauffe-eau</option>
<option>Autre</option>
</select>

<textarea name="message" placeholder="Décrivez le problème"></textarea>

<button type="submit">📩 ENVOYER PAR SMS</button>
</form>

<a class="call" href="tel:+33756833656">
📞 Appeler directement : 07 56 83 36 56
</a>

</div>
</div>

<script>
const PHONE = "0756833656";

function buildMessage(d){
return encodeURIComponent(
"Demande dépannage plomberie (AlloPlombier66)\n" +
"Nom: " + d.nom + "\n" +
"Tel client: " + d.tel + "\n" +
"Ville: " + d.ville + "\n" +
"Problème: " + d.urgence + "\n" +
"Détails: " + d.message
);
}

document.getElementById("smsForm").addEventListener("submit", function(e){
e.preventDefault();
const data = Object.fromEntries(new FormData(this));
window.location.href = "sms:" + PHONE + "?&body=" + buildMessage(data);
});
</script>

</body>
</html>
